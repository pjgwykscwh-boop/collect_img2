name: 采集验证码裁剪图

on:
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装Python依赖
        run: |
          pip install ddddocr pillow selenium webdriver-manager

      - name: 安装Chrome
        uses: browser-actions/setup-chrome@v1

      - name: 运行采集脚本
        env:
          LIB_ACCOUNT: ${{ secrets.LIB_ACCOUNT }}
          LIB_PASSWORD: ${{ secrets.LIB_PASSWORD }}
        run: |
          python collect_crops.py

      - name: 上传裁剪图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crops-${{ github.run_number }}
          path: artifacts/
          retention-days: 7
